          <textarea class="solution-code-js" hidden>
let titreProduits = ["Casque audio sans fil", "Clavier mecanique", "Souris ergonomique"];
let prixProduits = ["89.99 $", "129.99 $", "59.99 $"];
let imageProduits = [
  "https://picsum.photos/seed/casque-audio/320/200",
  "https://picsum.photos/seed/clavier-gamer/320/200",
  "https://picsum.photos/seed/souris-ergo/320/200"
];

for (let i = 0; i < titreProduits.length; i++) {
  let elementGrilleProduit = document.getElementById("grille-produit");
  let elementCarteProduit = document.createElement("div");
  elementCarteProduit.classList.add("carte-produit-simple");

  let titreProduit = titreProduits[i];
  let prixProduit = prixProduits[i];
  let imageProduit = imageProduits[i];

  elementCarteProduit.innerHTML = `
    <img class="image-produit" src="${imageProduit}" alt="${titreProduit}">
    <h3 class="titre-produit">${titreProduit}</h3>
    <p class="prix-produit">${prixProduit}</p>
  `;

  elementCarteProduit.onclick = function () {
    ajouterProduit(i);
  };

  elementGrilleProduit.appendChild(elementCarteProduit);
}

function ajouterProduit(indexProduit) {
  let titreProduit = titreProduits[indexProduit];
  let message = `${titreProduit} a ete ajoute au panier.`;
  afficherMessageAchat(message);
}

function afficherMessageAchat(message) {
  let elementMessagePanier = document.getElementById("message-panier");
  elementMessagePanier.innerHTML = `${message}`;
}
