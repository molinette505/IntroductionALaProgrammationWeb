          <textarea class="source-code-css" hidden>
.atelier-ui {
  max-width: 560px;
  border: 1px solid #334155;
  border-radius: 10px;
  padding: 14px;
  background: #0f172a;
  color: #e2e8f0;
}

#section-personnages {
  display: grid;
  gap: 8px;
}

.carte-personnage {
  border: 1px solid #3b82f6;
  border-radius: 8px;
  background: #172554;
  padding: 10px;
}

.image-personnage {
  width: 100%;
  max-width: 220px;
  border-radius: 8px;
  display: block;
}
</textarea>
          <textarea class="source-code-js" hidden>
// Cible la section qui recevra la carte.
let elementSectionPersonnages = document.getElementById("section-personnages");

// Crée une seule div
let elementCartePersonnage = document.createElement("div")

// Lui ajouter une classe
elementCartePersonnage.classList.add("carte-personnage");

// Changer le texte à l'intérieur
elementCartePersonnage.innerText = "Personnage : Lina";

// Ajoute la carte dans la section.
elementSectionPersonnages.appendChild(elementCartePersonnage);
</textarea>
