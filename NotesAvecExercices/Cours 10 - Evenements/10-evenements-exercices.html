        <textarea class="solution-code-js" hidden>
let etat = document.getElementById("etat-recap");
let actions = document.querySelectorAll(".btn-action");
let boutonStop = document.getElementById("btn-stop");

function gererAction(event) {
  let action = event.target.getAttribute("data-action");
  etat.innerText = `Action: ${action}`;
}

for (let i = 0; i < actions.length; i++) {
  actions[i].addEventListener("click", gererAction);
}

boutonStop.addEventListener("click", function () {
  for (let i = 0; i < actions.length; i++) {
    actions[i].removeEventListener("click", gererAction);
  }
  etat.innerText = "Listeners retires";
});
