        <textarea class="solution-code-js" hidden>
let compte = 5;
let idCompte = null;

function demarrerCompte() {
  idCompte = setInterval(function () {
    console.log(`Compte: ${compte}`);
    compte -= 1;

    if (compte < 0) {
      clearInterval(idCompte);
      console.log("Depart!");
    }
  }, 1000);
}

setTimeout(function () {
  console.log("Preparation...");
  demarrerCompte();
}, 1500);
