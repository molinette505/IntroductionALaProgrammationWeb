      <section class="section-spy">
        <h2 class="section-title">Compte a rebours avec setTimeout</h2>
        <p><code>setTimeout</code> execute une fonction une seule fois apres un delai.</p>
      </section>

      <section class="section-spy">
        <div class="section-header">
          <h3>setTimeout</h3>
        </div>

        <div class="playground-container" data-auto-height="true" data-output-default="console" data-type="example"
          data-console-open="true" data-title="Ordre d'execution avec setTimeout"
          data-toolbar-text='Commande: setTimeout(nomFonction, delai)'>
          <textarea class="source-code-html" hidden>
<div class="zone-timer">
  <p>Regarde la console pour voir l'ordre des messages.</p>
</div>
</textarea>
          <textarea class="source-code-css" hidden>
.zone-timer {
  max-width: 440px;
  padding: 14px;
  border: 1px solid #334155;
  border-radius: 12px;
  background: #0f172a;
  color: #e2e8f0;
  font-family: "JetBrains Mono", monospace;
}
</textarea>
          <textarea class="source-code-js" hidden>
console.log("Debut du script");

setTimeout(function () {
  console.log("Message retarde de 2 secondes");
}, 2000);

console.log("Fin immediate du script");
</textarea>
        </div>

        <div class="playground-container" data-auto-height="true" data-output-default="console" data-type="exercise"
          data-console-open="true" data-title="Exercice : deux alertes retardees"
          data-toolbar-text='Commandes: setTimeout(...) + console.log(...)'>
          <textarea class="source-code-html" hidden>
<div class="zone-timer">
  <p>Complete les TODO puis ouvre la console.</p>
</div>
</textarea>
          <textarea class="source-code-css" hidden>
.zone-timer {
  max-width: 440px;
  padding: 14px;
  border: 1px solid #334155;
  border-radius: 12px;
  background: #0f172a;
  color: #e2e8f0;
  font-family: "JetBrains Mono", monospace;
}
</textarea>
          <textarea class="source-code-js" hidden>
function annoncerPreparation() {
  console.log("Preparation du sort...");
}

function annoncerLancement() {
  console.log("Sort lance !");
}

console.log("Sequence demarree");

// TODO 1: Lance annoncerPreparation apres 1000 ms.

// TODO 2: Lance annoncerLancement apres 2500 ms.

console.log("Attente des timers...");
</textarea>
          <textarea class="solution-code-html" hidden>
<div class="zone-timer">
  <p>Complete les TODO puis ouvre la console.</p>
</div>
</textarea>
          <textarea class="solution-code-css" hidden>
.zone-timer {
  max-width: 440px;
  padding: 14px;
  border: 1px solid #334155;
  border-radius: 12px;
  background: #0f172a;
  color: #e2e8f0;
  font-family: "JetBrains Mono", monospace;
}
</textarea>
          <textarea class="solution-code-js" hidden>
function annoncerPreparation() {
  console.log("Preparation du sort...");
}

function annoncerLancement() {
  console.log("Sort lance !");
}

console.log("Sequence demarree");
setTimeout(annoncerPreparation, 1000);
setTimeout(annoncerLancement, 2500);
console.log("Attente des timers...");
</textarea>
